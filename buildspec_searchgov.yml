
version: 0.2

phases:
  install:
    runtime-versions:
      ruby: 3.3
      nodejs: 20
    commands:
      - set -euo pipefail
      - echo "[CODEDEPLOY][INSTALL] Starting install phase"
      - echo "[CODEDEPLOY][INSTALL] Ruby version: $(ruby -v)"
      - echo "[CODEDEPLOY][INSTALL] Node version: $(node -v)"
      - echo "[CODEDEPLOY][INSTALL] Yarn version: $(yarn -v || true)"

  pre_build:
    commands:
      - set -euo pipefail
      - echo "[CODEDEPLOY][PRE_BUILD] =================================================="
      - echo "[CODEDEPLOY][PRE_BUILD] Build metadata"
      - echo "[CODEDEPLOY][PRE_BUILD] Commit: ${CODEBUILD_RESOLVED_SOURCE_VERSION:-unknown}"
      - echo "[CODEDEPLOY][PRE_BUILD] Build ID: ${CODEBUILD_BUILD_ID:-unknown}"
      - echo "[CODEDEPLOY][PRE_BUILD] Environment: ${SEARCH_ENV:-unknown}"
      - echo "[CODEDEPLOY][PRE_BUILD] Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
      - echo "[CODEDEPLOY][PRE_BUILD] =================================================="

  build:
    commands:
      - set -euo pipefail
      - echo "[CODEDEPLOY][BUILD] Installing Ruby gems for deployment artifact"
      - bundle install --jobs 4 --retry 3
      - echo "[CODEDEPLOY][BUILD] Creating deployment manifest for troubleshooting"
      - |
        cat > deployment_manifest.json <<MANIFEST
        {
          "application": "search-gov",
          "commit": "${CODEBUILD_RESOLVED_SOURCE_VERSION:-unknown}",
          "build_id": "${CODEBUILD_BUILD_ID:-unknown}",
          "build_number": "${CODEBUILD_BUILD_NUMBER:-unknown}",
          "generated_at_utc": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
        }
        MANIFEST
      - echo "[CODEDEPLOY][BUILD] Manifest created"

  post_build:
    commands:
      - set -euo pipefail
      - echo "[CODEDEPLOY][POST_BUILD] Listing key deployment files"
      - ls -la appspec.yml buildspec_searchgov.yml deployment_manifest.json
      - ls -la cicd-scripts
      - echo "[CODEDEPLOY][POST_BUILD] Build completed successfully"

artifacts:
  files:
    - '**/*'
